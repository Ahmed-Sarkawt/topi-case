name: Deploy — Standalone Presentation

on:
  push:
    branches: [full-dashboard]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare publish dir
        run: |
          mkdir -p _publish
          cp send-presentation.html _publish/index.html

      - name: Deploy to GitHub Pages (full subdirectory)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _publish
          destination_dir: full
          keep_files: true
